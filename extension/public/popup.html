<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: white;
    }
    
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 20px;
      text-align: center;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .tagline {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 20px;
    }
    
    .status-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .status-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .status-value {
      font-size: 24px;
      font-weight: 700;
    }
    
    .status-value.connected {
      color: #10b981;
    }
    
    .status-value.disconnected {
      color: #ef4444;
    }
    
    .quick-actions {
      margin-bottom: 16px;
    }
    
    .quick-actions h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    .action-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .action-btn:hover {
      background: #334155;
      border-color: #475569;
    }
    
    .action-btn.primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-color: transparent;
    }
    
    .action-btn.primary:hover {
      opacity: 0.9;
    }
    
    .settings-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .settings-btn:hover {
      background: #1e293b;
      color: white;
    }
    
    .api-setup {
      text-align: center;
      padding: 20px;
    }
    
    .api-setup p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .setup-btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    
    .setup-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Content will be loaded by JavaScript -->
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
